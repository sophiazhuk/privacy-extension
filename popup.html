<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sparrow's Privacy Policy Reader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <div class="header-row">
        <h1>Sparrow's Privacy Policy Reader</h1>
        <button id="settingsBtn" class="settings-button" type="button" aria-label="Open settings">⋯</button>
      </div>

      <p>Current site: <strong id="domainText">...</strong></p>
      <p>
        Policy URL:
        <a id="policyUrl" href="#" target="_blank" rel="noreferrer">not found yet</a>
      </p>

      <p>
        <button id="findPolicyBtn">find policy on page</button> <br />
        <button id="summarizeBtn">summarize policy</button>
      </p>

      <section id="manualUrlSection" class="panel-section hidden">
        <label for="manualPolicyUrl">add policy URL manually</label>
        <input
          id="manualPolicyUrl"
          type="url"
          placeholder="Enter policy URL"
          inputmode="url"
        />
        <button id="manualUrlBtn" type="button">use this URL</button>
      </section>

      <p id="status"></p>

      <section id="reportPanel" class="panel-section hidden">
        <h2>Privacy Report</h2>
        <div id="reportSummary"></div>
        <div id="reportCategories"></div>
        <div id="reportUnknowns"></div>
      </section>

      <section class="panel-section">
        <h2>ai output (for debugging)</h2>
        <pre id="aiOutput"></pre>
      </section>

      <section class="panel-section">
        <h2>fetched policy text (for debugging)</h2>
        <pre id="fetchedText"></pre>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
