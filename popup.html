<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sparrow's Privacy Policy Reader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <div class="header-row">
        <h1>Sparrow's Privacy Policy Reader</h1>
        <button id="settingsBtn" class="settings-button" type="button" aria-label="Open settings">⋯</button>
      </div>

      <p>Current site: <strong id="domainText">...</strong></p>
      <p>
        Policy URL:
        <a id="policyUrl" href="#" target="_blank" rel="noreferrer">Not Found Yet</a>
      </p>

      <p>
        <button id="findPolicyBtn">Summarize Policy</button>
      </p>

      <section id="manualUrlSection" class="panel-section hidden">
        <label for="manualPolicyUrl">Add Policy URL Manually</label>
        <input
          id="manualPolicyUrl"
          type="url"
          placeholder="Enter policy URL"
          inputmode="url"
        />
        <button id="manualUrlBtn" type="button">Use this URL</button>
      </section>

      <p id="status"></p>

      <section id="reportPanel" class="panel-section hidden">
        <div id="reportSummary"></div>
        <div id="reportCategories"></div>
        <div id="reportUnknowns"></div>
      </section>

      <details class="panel-section debug-panel">
        <summary>Debug Info</summary>

        <section class="debug-section">
          <div class="debug-header">
            <h2>Debug Dump</h2>
            <button id="copyDebugBtn" class="secondary-button" type="button">copy</button>
          </div>
          <textarea id="debugDump" readonly spellcheck="false"></textarea>
        </section>

        <section class="debug-section">
          <h2>AI Output</h2>
          <pre id="aiOutput"></pre>
        </section>

        <section class="debug-section">
          <h2>Fetched Policy Text</h2>
          <pre id="fetchedText"></pre>
        </section>
      </details>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
