<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sparrow's Privacy Policy Reader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Sparrow's Privacy Policy Reader</h1>

      <p>Current site: <strong id="domainText">...</strong></p>
      <p>
        Policy URL:
        <a id="policyUrl" href="#" target="_blank" rel="noreferrer">not found yet</a>
      </p>

      <p>
        <button id="findPolicyBtn">find policy on page</button> <br />
        <button id="summarizeBtn">summarize policy</button> <br />
        <button id="settingsBtn">settings</button>
      </p>

      <section id="manualUrlSection" class="panel-section hidden">
        <label for="manualPolicyUrl">add policy URL manually</label>
        <input
          id="manualPolicyUrl"
          type="url"
          placeholder="Enter policy URL"
          inputmode="url"
        />
        <button id="manualUrlBtn" type="button">use this URL</button>
      </section>

      <p id="status"></p>
      <h2>fetched policy text (placeholder)</h2>
      <pre id="fetchedText"></pre>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
